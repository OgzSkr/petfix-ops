# PetFix Ops API — nginx reverse proxy
# api.petfix.com.tr → Docker API (127.0.0.1:8787)

upstream petfix_ops_app {
    server 127.0.0.1:8787;
    keepalive 32;
}

# Rate limit — webhook dışı istekler
limit_req_zone $binary_remote_addr zone=petfix_api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=petfix_webhooks:10m rate=100r/s;

server {
    listen 443 ssl http2;
    server_name api.petfix.com.tr;

    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/api.petfix.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.petfix.com.tr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    client_max_body_size 8m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    location /health {
        proxy_pass http://petfix_ops_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    location /ready {
        proxy_pass http://petfix_ops_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /webhooks/ {
        limit_req zone=petfix_webhooks burst=200 nodelay;
        proxy_pass http://petfix_ops_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Webhook-Secret $http_x_webhook_secret;
        proxy_set_header X-Petfix-Webhook-Secret $http_x_petfix_webhook_secret;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 90s;
        proxy_cache off;
        add_header Cache-Control "no-store" always;
    }

    location /assets/ {
        limit_req zone=petfix_api_general burst=60 nodelay;
        proxy_pass http://petfix_ops_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location /ops/ {
        limit_req zone=petfix_api_general burst=60 nodelay;
        proxy_pass http://petfix_ops_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ops {
        return 301 /ops/;
    }

    location / {
        return 404;
    }
}

server {
    listen 80;
    server_name api.petfix.com.tr;
    return 301 https://$host$request_uri;
}
